<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantify | Login</title>
    <meta
      name="description"
      content="Welcome back to Plantify. Log in to your account to access exclusive plant care tips and offers."
    />
    <meta
      name="keywords"
      content="login Plantify, sign in, plant care, green living"
    />
    <meta name="author" content="Plantify" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:title" content="Login - Plantify" />
    <meta
      property="og:description"
      content="Welcome back to Plantify. Log in to your account to access exclusive plant care tips and offers."
    />
    <meta property="og:image" content="https://plantify-ite3.vercel.app/images/heroSEctionHomepage.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Beautiful plants and greenery at Plantify" />
    <meta property="og:url" content="https://plantify-ite3.vercel.app/login" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Plantify" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Login - Plantify" />
    <meta
      name="twitter:description"
      content="Welcome back to Plantify. Log in to your account to access exclusive plant care tips and offers."
    />
    <meta name="twitter:image" content="https://plantify-ite3.vercel.app/images/heroSEctionHomepage.jpg" />
    <meta name="twitter:image:alt" content="Beautiful plants and greenery at Plantify" />
    <link rel="stylesheet" href="../output.css" />
  </head>

  <body class="font-sport bg-white dark:bg-green-950">
    <!-- ================= HEADER ================= -->

    <main class="pt-24">
      <!-- ================= LOGIN SECTION ================= -->
      <section class="max-w-7xl mx-auto px-4 py-16">
        <div class="max-w-md mx-auto">
          <div class="text-center mb-8">
            <h1
              class="text-4xl font-bold text-primary dark:text-green-300 leading-tight"
            >
              Welcome Back 🌿
            </h1>
            <p class="text-gray-500 dark:text-gray-300 mt-2">
              Log in to your Plantify account to continue your green journey.
            </p>
          </div>

          <div
            class="bg-white dark:bg-green-950 shadow-lg border border-gray-100 dark:border-gray-700 rounded-3xl p-8"
          >
            <form class="flex flex-col gap-4">
              <input
                type="email"
                placeholder="Email Address"
                class="border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-3 outline-none focus:border-primary dark:focus:border-green-300 bg-white dark:bg-green-950 text-gray-900 dark:text-white"
                required
              />

              <input
                type="password"
                placeholder="Password"
                class="border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-3 outline-none focus:border-primary dark:focus:border-green-300 bg-white dark:bg-green-950 text-gray-900 dark:text-white"
                required
              />

              <div class="flex justify-between items-center text-sm">
                <label
                  class="flex items-center gap-2 text-gray-600 dark:text-gray-300"
                >
                  <input type="checkbox" class="rounded" />
                  Remember me
                </label>
                <a
                  href="#"
                  class="text-primary dark:text-green-300 hover:underline"
                  >Forgot password?</a
                >
              </div>

              <button
                type="submit"
                class="bg-primary text-white py-3 rounded-full font-semibold hover:bg-primary-dark transition-colors mt-4"
              >
                Log In
              </button>
            </form>

            <p class="text-center text-gray-500 dark:text-gray-300 mt-6">
              Don't have an account?
              <a
                href="signup.html"
                class="text-primary dark:text-green-300 hover:underline"
                >Sign Up</a
              >
            </p>
          </div>
        </div>
      </section>
    </main>

    <!-- ================= FOOTER ================= -->

    <script>
      let menuOpen = false;
      function toggleMenu() {
        menuOpen = !menuOpen;
        const menu = document.getElementById("mobileMenu");
        const b1 = document.getElementById("bar1");
        const b2 = document.getElementById("bar2");
        const b3 = document.getElementById("bar3");
        menu.style.maxHeight = menuOpen ? menu.scrollHeight + "px" : "0";
        if (menuOpen) {
          b1.style.transform = "translateY(6.5px) rotate(45deg)";
          b2.style.opacity = "0";
          b2.style.transform = "scaleX(0)";
          b3.style.transform = "translateY(-6.5px) rotate(-45deg)";
        } else {
          b1.style.transform =
            b2.style.opacity =
            b2.style.transform =
            b3.style.transform =
              "";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const html = document.documentElement;
        const buttons = document.querySelectorAll(".toggle-theme-btn");

        if (!buttons.length) {
          console.log("Theme toggle buttons not found ❌");
          return;
        }

        // Load saved theme
        try {
          const saved = localStorage.getItem("theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;

          if (saved === "dark" || (!saved && prefersDark)) {
            html.classList.add("dark");
          } else {
            html.classList.remove("dark");
          }
        } catch {}

        // Toggle
        buttons.forEach((btn) => {
          btn.addEventListener("click", () => {
            const isDark = html.classList.toggle("dark");

            try {
              localStorage.setItem("theme", isDark ? "dark" : "light");
            } catch {}
          });
        });
      });
    </script>
  </body>
</html>
